<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>深蓝计划 · 心动选择 | 相亲特别版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A1A2E; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px; color: #EFF3F8; }
        .app-container { max-width: 600px; margin: 0 auto; background: #0F2747; border-radius: 32px; padding: 20px 16px 30px; }
        .admin-container { max-width: 1400px; margin: 0 auto; background: #0F2747; border-radius: 32px; padding: 24px 20px; }
        h1 { font-size: 1.8rem; text-align: center; margin-bottom: 8px; background: linear-gradient(135deg, #C0E0FF, #7BA9E0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        h2 { font-size: 1.5rem; margin-bottom: 16px; color: #F5B042; }
        h3 { font-size: 1.2rem; margin: 16px 0 12px 0; color: #C0E0FF; }
        h4 { font-size: 1rem; margin: 12px 0 8px 0; color: #F5B042; }
        .sub { text-align: center; font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px; }

        .match-banner {
            background: linear-gradient(135deg, #F5B042, #E8912E);
            color: #0F2747;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 16px;
            font-weight: 600;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.9;} 50%{opacity:1;transform:scale(1.02);} }

        .guest-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 20px 0; }
        .guest-card { background: #112F4B; border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; position: relative; }
        .guest-card.selected { border-color: #F5B042; background: #1A3E5E; }
        .guest-card.self { border-color: #6F8FAA; opacity: 0.8; cursor: default; }
        .guest-card.self .self-badge { position: absolute; top: 8px; left: 8px; background: #6F8FAA; color: white; border-radius: 20px; padding: 2px 8px; font-size: 10px; }
        .check-badge { position: absolute; top: 8px; right: 8px; background: #F5B042; color: #0F2747; border-radius: 20px; padding: 4px 8px; font-size: 12px; font-weight: bold; display: none; }
        .guest-card.selected .check-badge { display: flex; align-items: center; gap: 4px; }
        .guest-photo { width: 100%; aspect-ratio: 1/1; background: #0A1A2E; display: flex; align-items: center; justify-content: center; }
        .guest-photo img { width: 100%; height: 100%; object-fit: cover; }
        .guest-info { padding: 12px; text-align: center; }
        .guest-number { font-weight: 700; font-size: 1rem; }
        
        /* 操作按钮组 */
        .action-buttons { display: flex; gap: 8px; margin-top: 6px; justify-content: center; }
        .action-btn { background: #2C6280; border: none; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        .action-btn.whisper { background: #F5B042; color: #0F2747; }

        .selected-bar { background: #1A3A50; border-radius: 40px; padding: 10px 16px; margin: 12px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .selected-tag { background: #F5B042; color: #0F2747; border-radius: 30px; padding: 4px 12px; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .selected-tag .remove { cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }

        button { background: #2C6280; border: none; color: white; font-weight: 600; padding: 12px 20px; border-radius: 60px; font-size: 1rem; cursor: pointer; margin-top: 8px; }
        button.primary { background: #F5B042; color: #0F2747; width: 100%; }
        button.danger { background: #8B3C3C; }
        button.secondary { background: #2C6280; }
        .btn-small { width: auto; padding: 8px 16px; display: inline-block; margin: 4px; }

        input, textarea, select { width: 100%; padding: 12px 14px; border-radius: 28px; border: none; background: #1A3A50; color: white; font-size: 0.95rem; outline: none; margin-bottom: 12px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; }

        .msg-list { background: #0A1A2E; border-radius: 24px; padding: 12px; max-height: 280px; overflow-y: auto; margin-top: 12px; }
        .msg-item { background: #143450; padding: 10px 14px; border-radius: 20px; margin-bottom: 8px; font-size: 0.85rem; }
        .msg-meta { color: #F5B042; font-size: 0.7rem; margin-bottom: 4px; }
        .badge { background: #2C6280; padding: 4px 12px; border-radius: 40px; font-size: 0.75rem; display: inline-block; margin: 4px; }
        .whisper-box { background: #1A3A50; border-radius: 20px; padding: 12px; margin-top: 16px; border-left: 3px solid #F5B042; }

        /* 弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #0F2747; border-radius: 32px; max-width: 340px; width: 100%; padding: 24px; border: 1px solid #F5B042; }
        .modal-content h3 { text-align: center; margin-bottom: 16px; }
        .edit-input { margin-bottom: 12px; }

        table { width: 100%; border-collapse: collapse; background: #112F4B; border-radius: 20px; overflow: hidden; margin: 15px 0; font-size: 0.8rem; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #2A4B6E; }
        th { background: #0A1C2C; }
        .admin-section { background: #143450; border-radius: 24px; padding: 16px; margin-bottom: 24px; }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .photo-upload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 12px; }
        .upload-item { background: #0F2747; border-radius: 16px; padding: 8px; text-align: center; }
        .upload-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; }
        .guest-stats-card { display: inline-block; background: #0F2747; padding: 4px 10px; border-radius: 20px; margin: 4px; font-size: 0.75rem; }
        .pair-card { background: #112F4B; padding: 10px 12px; border-radius: 16px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
    // ==================== 存储KEY ====================
    const STORAGE = {
        GUESTS: 'DB_guests', PROFILES: 'DB_profiles', VOTES_R1: 'DB_v1', VOTES_R2: 'DB_v2',
        WHISPERS_R1: 'DB_w1', WHISPERS_R2: 'DB_w2', MESSAGES: 'DB_msgs', PHOTOS: 'DB_photos'
    };
    
    function initData(){
        if(!localStorage.getItem(STORAGE.GUESTS)){
            let guests = [];
            for(let i=1;i<=20;i++) guests.push({ id: i.toString().padStart(2,'0') });
            localStorage.setItem(STORAGE.GUESTS, JSON.stringify(guests));
        }
        if(!localStorage.getItem(STORAGE.PROFILES)){
            let p = {};
            for(let i=1;i<=20;i++) p[i.toString().padStart(2,'0')] = { age:'?', job:'待填写', intro:'期待与你相遇', photo:'', selfIntro:'' };
            localStorage.setItem(STORAGE.PROFILES, JSON.stringify(p));
        }
        if(!localStorage.getItem(STORAGE.PHOTOS)) localStorage.setItem(STORAGE.PHOTOS, '{}');
        if(!localStorage.getItem(STORAGE.VOTES_R1)) localStorage.setItem(STORAGE.VOTES_R1, '{}');
        if(!localStorage.getItem(STORAGE.VOTES_R2)) localStorage.setItem(STORAGE.VOTES_R2, '{}');
        if(!localStorage.getItem(STORAGE.WHISPERS_R1)) localStorage.setItem(STORAGE.WHISPERS_R1, '{}');
        if(!localStorage.getItem(STORAGE.WHISPERS_R2)) localStorage.setItem(STORAGE.WHISPERS_R2, '{}');
        if(!localStorage.getItem(STORAGE.MESSAGES)) localStorage.setItem(STORAGE.MESSAGES, '[]');
    }
    
    function getGuests(){ return JSON.parse(localStorage.getItem(STORAGE.GUESTS)); }
    function getProfiles(){ return JSON.parse(localStorage.getItem(STORAGE.PROFILES)); }
    function getPhotos(){ return JSON.parse(localStorage.getItem(STORAGE.PHOTOS)); }
    function savePhotos(p){ localStorage.setItem(STORAGE.PHOTOS, JSON.stringify(p)); }
    function saveProfiles(p){ localStorage.setItem(STORAGE.PROFILES, JSON.stringify(p)); }
    function getVotes(r){ return JSON.parse(localStorage.getItem(r===1?STORAGE.VOTES_R1:STORAGE.VOTES_R2)); }
    function saveVotes(r,d){ localStorage.setItem(r===1?STORAGE.VOTES_R1:STORAGE.VOTES_R2, JSON.stringify(d)); }
    function getWhispers(r){ return JSON.parse(localStorage.getItem(r===1?STORAGE.WHISPERS_R1:STORAGE.WHISPERS_R2)); }
    function saveWhispers(r,d){ localStorage.setItem(r===1?STORAGE.WHISPERS_R1:STORAGE.WHISPERS_R2, JSON.stringify(d)); }
    function getMessages(){ return JSON.parse(localStorage.getItem(STORAGE.MESSAGES)); }
    function addMessageToAdmin(nick,code,txt){
        let msgs = getMessages();
        msgs.push({ nickname:nick, code:code, text:txt, type:'admin_msg', timestamp:new Date().toISOString() });
        localStorage.setItem(STORAGE.MESSAGES, JSON.stringify(msgs));
    }
    function clearAllData(){
        localStorage.removeItem(STORAGE.GUESTS);
        localStorage.removeItem(STORAGE.PROFILES);
        localStorage.removeItem(STORAGE.VOTES_R1);
        localStorage.removeItem(STORAGE.VOTES_R2);
        localStorage.removeItem(STORAGE.WHISPERS_R1);
        localStorage.removeItem(STORAGE.WHISPERS_R2);
        localStorage.removeItem(STORAGE.MESSAGES);
        localStorage.removeItem(STORAGE.PHOTOS);
        initData();
    }
    
    function getMutualPairs(round){
        let votes = getVotes(round);
        let pairs = [];
        let users = Object.keys(votes);
        for(let i=0;i<users.length;i++){
            for(let j=i+1;j<users.length;j++){
                let codeA = users[i].split('_')[0], codeB = users[j].split('_')[0];
                if(votes[users[i]]?.includes(codeB) && votes[users[j]]?.includes(codeA)){
                    pairs.push({ userA:users[i], userB:users[j], codeA, codeB });
                }
            }
        }
        return pairs;
    }
    
    function getUserMutualMatches(userKey, round){
        let pairs = getMutualPairs(round);
        return pairs.filter(p => p.userA === userKey || p.userB === userKey);
    }
    
    function getReceivedWhispers(userKey, round){
        let allWhispers = getWhispers(round);
        let myCode = userKey.split('_')[0];
        let received = [];
        for(let [fromKey, whispers] of Object.entries(allWhispers)){
            if(fromKey !== userKey && whispers[myCode]){
                received.push({ from: fromKey, message: whispers[myCode], fromCode: fromKey.split('_')[0] });
            }
        }
        return received;
    }
    
    let currentView = 'user';
    function render(){
        let app = document.getElementById('app');
        if(currentView === 'adminLogin') renderAdminLogin(app);
        else if(currentView === 'admin') renderAdminPanel(app);
        else renderUserPanel(app);
    }
    
    // ==================== 用户端 ====================
    function renderUserPanel(container){
        let userKey = sessionStorage.getItem('userKey');
        let userNick = sessionStorage.getItem('userNick');
        let userCode = sessionStorage.getItem('userCode');
        let userRound = sessionStorage.getItem('userRound');
        
        // 登录界面
        if(!userKey || !userNick || !userCode){
            container.innerHTML = `<div class="app-container"><h1>💙 深蓝计划</h1><div class="sub">恋爱实验室 · 心动选择</div><input id="codeInput" placeholder="编号 (01-20)"><input id="nickInput" placeholder="昵称"><button id="loginBtn" class="primary">进入选择</button><div style="font-size:12px; color:#6F8FAA; text-align:center; margin-top:16px;">💡 提示：不能给自己投票，点击他人可查看资料</div></div>`;
            document.getElementById('loginBtn')?.addEventListener('click',()=>{
                let code = document.getElementById('codeInput').value.trim();
                let nick = document.getElementById('nickInput').value.trim();
                if(!code || !nick) return alert('请填写完整');
                code = code.padStart(2,'0');
                if(parseInt(code)<1 || parseInt(code)>20) return alert('编号01-20');
                let key = `${code}_${nick}`;
                let r1Votes = getVotes(1);
                let round = r1Votes[key] ? '2' : '1';
                sessionStorage.setItem('userKey', key);
                sessionStorage.setItem('userNick', nick);
                sessionStorage.setItem('userCode', code);
                sessionStorage.setItem('userRound', round);
                render();
            });
            return;
        }
        
        let currentRound = parseInt(userRound);
        let guests = getGuests();
        let photos = getPhotos();
        let profiles = getProfiles();
        let existing = getVotes(currentRound)[userKey] || [];
        let selectedIds = [...existing];
        
        let hasMatch = getUserMutualMatches(userKey, currentRound).length > 0;
        let receivedWhispers = getReceivedWhispers(userKey, currentRound);
        
        function buildCards(){
            return guests.map(g => {
                let isSelected = selectedIds.includes(g.id);
                let isSelf = (g.id === userCode);
                let photoUrl = photos[g.id] || '';
                return `<div class="guest-card ${isSelected ? 'selected' : ''} ${isSelf ? 'self' : ''}" data-id="${g.id}">
                    ${isSelf ? '<div class="self-badge">👤 自己</div>' : ''}
                    ${isSelected ? '<div class="check-badge">❤️ 已选</div>' : ''}
                    <div class="guest-photo">${photoUrl ? `<img src="${photoUrl}">` : '<div style="color:#5F7F9F;">📷</div>'}</div>
                    <div class="guest-info">
                        <div class="guest-number">#${g.id}</div>
                        ${!isSelf ? `<div class="action-buttons">
                            <button class="action-btn" data-action="view" data-id="${g.id}">👁️ 查看</button>
                            <button class="action-btn whisper" data-action="whisper" data-id="${g.id}">💌 悄悄话</button>
                        </div>` : `<div class="action-buttons">
                            <button class="action-btn" data-action="editSelf" data-id="${g.id}">✏️ 编辑我的资料</button>
                        </div>`}
                    </div>
                </div>`;
            }).join('');
        }
        
        function buildSelectedBar(){
            if(selectedIds.length===0) return '<div class="selected-bar">💔 尚未选择任何心动嘉宾</div>';
            let tags = selectedIds.map(id => `<span class="selected-tag">#${id} <span class="remove" data-id="${id}">✕</span></span>`).join('');
            return `<div class="selected-bar">✅ 已选（${selectedIds.length}/3）：${tags}</div>`;
        }
        
        function showProfileModal(gid, isSelf=false){
            let p = profiles[gid] || { age:'?', job:'待填写', intro:'期待与你相遇' };
            let modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content">
                <h3 style="color:#F5B042;">#${gid} ${isSelf ? '(我的资料)' : ''}</h3>
                <p>🎂 年龄：${escapeHtml(p.age)}</p>
                <p>💼 职业：${escapeHtml(p.job)}</p>
                <p>💬 自我介绍：${escapeHtml(p.selfIntro || p.intro || '期待与你相遇')}</p>
                <button id="closeModal" style="margin-top:16px;">关闭</button>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModal')?.addEventListener('click',()=>modal.remove());
        }
        
        function showEditSelfModal(){
            let p = profiles[userCode] || { age:'', job:'', selfIntro:'' };
            let modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content">
                <h3 style="color:#F5B042;">✏️ 编辑我的资料</h3>
                <input type="text" id="editAge" placeholder="年龄" value="${escapeHtml(p.age)}" style="margin-bottom:10px;">
                <input type="text" id="editJob" placeholder="职业" value="${escapeHtml(p.job)}" style="margin-bottom:10px;">
                <textarea id="editIntro" rows="3" placeholder="自我介绍（让别人更了解你）" style="margin-bottom:10px;">${escapeHtml(p.selfIntro || p.intro || '')}</textarea>
                <div class="flex-row" style="justify-content:center;">
                    <button id="saveSelfBtn" class="btn-small primary">保存</button>
                    <button id="closeModalBtn" class="btn-small">取消</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('saveSelfBtn')?.addEventListener('click',()=>{
                let newProfiles = {...getProfiles()};
                newProfiles[userCode] = {
                    age: document.getElementById('editAge').value || '?',
                    job: document.getElementById('editJob').value || '待填写',
                    selfIntro: document.getElementById('editIntro').value || '期待与你相遇',
                    intro: document.getElementById('editIntro').value || '期待与你相遇'
                };
                saveProfiles(newProfiles);
                alert('资料已保存！');
                modal.remove();
                render();
            });
            document.getElementById('closeModalBtn')?.addEventListener('click',()=>modal.remove());
        }
        
        function showWhisperModal(targetId){
            let modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content">
                <h3 style="color:#F5B042;">💌 给 #${targetId} 的悄悄话</h3>
                <textarea id="whisperText" rows="3" placeholder="输入你想说的话（限30字）..." maxlength="30" style="margin-bottom:10px;"></textarea>
                <div class="flex-row" style="justify-content:center;">
                    <button id="sendWhisperBtn" class="btn-small primary">发送</button>
                    <button id="closeModalBtn" class="btn-small">取消</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('sendWhisperBtn')?.addEventListener('click',()=>{
                let whisper = document.getElementById('whisperText').value.trim();
                if(!whisper) { alert('请输入悄悄话'); return; }
                if(whisper.length > 30) { alert('悄悄话不能超过30字'); return; }
                let whisMap = getWhispers(currentRound);
                if(!whisMap[userKey]) whisMap[userKey] = {};
                whisMap[userKey][targetId] = whisper;
                saveWhispers(currentRound, whisMap);
                alert(`悄悄话已发送给 #${targetId}！`);
                modal.remove();
            });
            document.getElementById('closeModalBtn')?.addEventListener('click',()=>modal.remove());
        }
        
        container.innerHTML = `<div class="app-container">
            <h1>💙 心动选择</h1>
            <div class="sub">${escapeHtml(userNick)} (${userCode}) · 第${currentRound}轮</div>
            ${hasMatch ? '<div class="match-banner" id="matchBanner">✨ 有人与你互选了！点击查看详情 ✨</div>' : ''}
            ${receivedWhispers.length ? `<div class="whisper-box">💌 收到的悄悄话：<br>${receivedWhispers.map(w=>`「${escapeHtml(w.message)}」—— 来自${w.fromCode}`).join('<br>')}</div>` : ''}
            <div id="selectedBar">${buildSelectedBar()}</div>
            <div class="guest-grid" id="guestGrid">${buildCards()}</div>
            <button id="submitBtn" class="primary">❤️ 提交心动选择 (最多3人)</button>
            <button id="resetBtn" class="secondary">✨ 重新选择 / 进入下一轮</button>
            <div class="message-area">
                <div>📢 给后台留言（帮助现场匹配）</div>
                <textarea id="msgInput" rows="2" placeholder="例如：我想和XX号嘉宾认识、我希望能匹配到同城的朋友..."></textarea>
                <button id="sendMsgBtn">发送给后台</button>
                <div class="msg-list" id="msgArea"></div>
            </div>
        </div>`;
        
        function updateUI(){
            let grid = document.getElementById('guestGrid');
            let bar = document.getElementById('selectedBar');
            if(grid) grid.innerHTML = buildCards();
            if(bar) bar.innerHTML = buildSelectedBar();
            bindEvents();
        }
        
        function bindEvents(){
            // 卡片点击选择（不能选自己）
            document.querySelectorAll('.guest-card').forEach(card => {
                let gid = card.dataset.id;
                let isSelf = (gid === userCode);
                if(!isSelf){
                    card.onclick = (e) => {
                        if(e.target.classList.contains('action-btn')) return;
                        let idx = selectedIds.indexOf(gid);
                        if(idx !== -1){
                            selectedIds.splice(idx,1);
                        } else {
                            if(selectedIds.length >= 3) { alert('最多选择3位心动嘉宾'); return; }
                            selectedIds.push(gid);
                        }
                        updateUI();
                    };
                }
            });
            // 操作按钮
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let gid = btn.dataset.id;
                    let action = btn.dataset.action;
                    if(action === 'view') showProfileModal(gid, false);
                    else if(action === 'whisper') showWhisperModal(gid);
                    else if(action === 'editSelf') showEditSelfModal();
                };
            });
            document.querySelectorAll('.selected-tag .remove').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let id = btn.dataset.id;
                    let idx = selectedIds.indexOf(id);
                    if(idx !== -1) selectedIds.splice(idx,1);
                    updateUI();
                };
            });
        }
        bindEvents();
        
        document.getElementById('submitBtn')?.addEventListener('click',()=>{
            if(selectedIds.length===0) return alert('请至少选择1位心动嘉宾');
            let v = getVotes(currentRound);
            v[userKey] = selectedIds;
            saveVotes(currentRound, v);
            alert(`第${currentRound}轮提交成功！`);
            render();
        });
        
        document.getElementById('resetBtn')?.addEventListener('click',()=>{
            if(currentRound===1){ sessionStorage.setItem('userRound','2'); alert('进入第二轮心动选择'); }
            else alert('重新选择本轮嘉宾');
            render();
        });
        
        document.getElementById('sendMsgBtn')?.addEventListener('click',()=>{
            let txt = document.getElementById('msgInput').value.trim();
            if(txt) { addMessageToAdmin(userNick, userCode, txt); document.getElementById('msgInput').value=''; loadMsgs(); alert('留言已发送给后台'); }
        });
        
        document.getElementById('matchBanner')?.addEventListener('click',()=>{
            let m = getUserMutualMatches(userKey, currentRound);
            if(m.length) alert(`✨ 互选成功！✨\n您与编号 ${m.map(v=>v.codeA===userCode?v.codeB:v.codeA).join(', ')} 双向选择了对方！`);
            else alert('暂无新互选结果');
        });
        
        function loadMsgs(){
            let msgs = getMessages();
            let area = document.getElementById('msgArea');
            if(area) area.innerHTML = msgs.slice(-20).reverse().map(m=>`<div class="msg-item"><div class="msg-meta">${escapeHtml(m.nickname)}(${m.code}) ${new Date(m.timestamp).toLocaleString()}</div><div>${escapeHtml(m.text)}</div></div>`).join('');
            if(msgs.length===0) area.innerHTML = '<div class="msg-item">暂无留言，可以给后台留言说明你的需求～</div>';
        }
        loadMsgs();
        if(window.msgInt) clearInterval(window.msgInt);
        window.msgInt = setInterval(()=>{ if(currentView==='user') loadMsgs(); }, 3000);
    }
    
    // ==================== 后台登录 ====================
    function renderAdminLogin(c){
        c.innerHTML = `<div style="max-width:400px;margin:80px auto;background:#0F2747;padding:32px;border-radius:48px;"><h2>🔐 后台管理</h2><input type="password" id="pwd" placeholder="密码" style="margin:16px 0"><button id="login" class="primary">登录</button></div>`;
        document.getElementById('login')?.addEventListener('click',()=>{
            if(document.getElementById('pwd').value === 'deepblue2025'){ currentView='admin'; render(); }
            else alert('密码错误');
        });
    }
    
    // ==================== 后台完整面板 ====================
    function renderAdminPanel(container){
        let guests = getGuests();
        let profiles = getProfiles();
        let photos = getPhotos();
        let r1Votes = getVotes(1), r2Votes = getVotes(2);
        let r1Whispers = getWhispers(1), r2Whispers = getWhispers(2);
        let r1Mutual = getMutualPairs(1), r2Mutual = getMutualPairs(2);
        
        function countSelected(votesMap){
            let counts = {};
            guests.forEach(g=>counts[g.id]=0);
            Object.values(votesMap).forEach(selections=>{ selections?.forEach(sid=>{ if(counts[sid]!==undefined) counts[sid]++; }); });
            return counts;
        }
        let r1Counts = countSelected(r1Votes);
        let r2Counts = countSelected(r2Votes);
        
        // 嘉宾资料配置表格
        let guestRows = guests.map(g => `
            <tr>
                <td><a href="#" class="view-profile" data-id="${g.id}" style="color:#F5B042;">#${g.id}</a></td>
                <td>${r1Counts[g.id]}</td><td>${r2Counts[g.id]}</td><td>${r1Counts[g.id]+r2Counts[g.id]}</td>
                <td>
                    <input type="text" class="profileAge" data-id="${g.id}" value="${escapeHtml(profiles[g.id]?.age||'')}" placeholder="年龄" style="width:55px">
                    <input type="text" class="profileJob" data-id="${g.id}" value="${escapeHtml(profiles[g.id]?.job||'')}" placeholder="职业" style="width:80px">
                    <input type="text" class="profileIntro" data-id="${g.id}" value="${escapeHtml(profiles[g.id]?.selfIntro||profiles[g.id]?.intro||'')}" placeholder="自我介绍" style="width:140px">
                 </td>
             </tr>
        `).join('');
        
        // 悄悄话汇总
        let whispersHtml = '';
        for(let round=1;round<=2;round++){
            let whisMap = round===1?r1Whispers:r2Whispers;
            whispersHtml += `<h4>📝 第${round}轮悄悄话</h4><div>`;
            let hasAny = false;
            for(let [userKey, map] of Object.entries(whisMap)){
                for(let [guestId, msg] of Object.entries(map)){
                    whispersHtml += `<div class="guest-stats-card">${escapeHtml(userKey)} → 嘉宾${guestId}: “${escapeHtml(msg)}”</div>`;
                    hasAny = true;
                }
            }
            if(!hasAny) whispersHtml += '<div class="guest-stats-card">暂无悄悄话</div>';
            whispersHtml += `</div>`;
        }
        
        // 互选配对详情
        let mutualHtml = `<h4>💞 首轮互选 (${r1Mutual.length}对)</h4>`;
        if(r1Mutual.length===0) mutualHtml += '<div class="guest-stats-card">暂无互选</div>';
        r1Mutual.forEach(p=>{ mutualHtml += `<div class="pair-card">✅ ${escapeHtml(p.userA)} ↔ ${escapeHtml(p.userB)}</div>`; });
        mutualHtml += `<h4>💞 次轮互选 (${r2Mutual.length}对)</h4>`;
        if(r2Mutual.length===0) mutualHtml += '<div class="guest-stats-card">暂无互选</div>';
        r2Mutual.forEach(p=>{ mutualHtml += `<div class="pair-card">✅ ${escapeHtml(p.userA)} ↔ ${escapeHtml(p.userB)}</div>`; });
        
        // 双轮深度互选
        let r1PairsSet = new Set(r1Mutual.map(p=>`${p.codeA}_${p.codeB}`));
        let r2PairsSet = new Set(r2Mutual.map(p=>`${p.codeA}_${p.codeB}`));
        let deepMutual = [];
        r1Mutual.forEach(p=>{
            if(r2PairsSet.has(`${p.codeA}_${p.codeB}`) || r2PairsSet.has(`${p.codeB}_${p.codeA}`)){
                deepMutual.push(p);
            }
        });
        let deepHtml = `<h4>💎 双轮深度互选 (两轮都互选: ${deepMutual.length}对)</h4>`;
        deepMutual.forEach(p=>{ deepHtml += `<div class="pair-card">✨ ${p.codeA} ⇄ ${p.codeB} (两轮双向奔赴)</div>`; });
        
        container.innerHTML = `
            <div class="admin-container">
                <div class="flex-row">
                    <h2>📊 深蓝计划 · 后台管理系统</h2>
                    <div><button id="backToUser" class="btn-small">🏠 返回用户端</button><button id="clearAllBtn" class="btn-small" style="background:#8B3C3C;">🗑️ 清空全部数据</button></div>
                </div>
                <div class="flex-row"><span class="badge">📋 总嘉宾:20</span><span class="badge">✅ 首轮提交:${Object.keys(r1Votes).length}人</span><span class="badge">✅ 次轮提交:${Object.keys(r2Votes).length}人</span><span class="badge">💞 总互选:${r1Mutual.length+r2Mutual.length}对</span></div>
                
                <div class="admin-section"><h3>🖼️ 嘉宾照片上传</h3><div class="photo-upload-grid" id="photoGrid"></div></div>
                
                <div class="admin-section"><h3>📝 嘉宾资料卡配置</h3><p style="font-size:12px; opacity:0.7;">💡 点击编号可预览效果</p>
                    <table><thead><tr><th>编号</th><th>首轮被选</th><th>次轮被选</th><th>总计</th><th>资料(年龄/职业/自我介绍)</th></tr></thead><tbody>${guestRows}</tbody></table>
                    <button id="saveProfilesBtn" class="primary" style="width:auto;">💾 保存所有资料卡</button>
                </div>
                
                <div class="admin-section"><h3>📈 嘉宾被选热度</h3><div id="hotRank"></div></div>
                
                <div class="admin-section"><h3>💌 所有悄悄话汇总</h3>${whispersHtml}</div>
                
                <div class="admin-section"><h3>💞 互选匹配详情</h3>${mutualHtml}${deepHtml}</div>
                
                <div class="admin-section"><h3>💬 参与者留言（帮助现场匹配）</h3><div id="adminMsgs" class="msg-list" style="max-height:350px;"></div></div>
            </div>
        `;
        
        // 照片上传
        let photoGrid = document.getElementById('photoGrid');
        if(photoGrid){
            guests.forEach(g=>{
                let imgSrc = photos[g.id]||'';
                photoGrid.innerHTML += `<div class="upload-item"><div>#${g.id}</div>${imgSrc?`<img src="${imgSrc}">`:'<div style="height:80px;background:#1A3A50;">无照片</div>'}<input type="file" class="uploadPhoto" data-id="${g.id}" accept="image/*"></div>`;
            });
            document.querySelectorAll('.uploadPhoto').forEach(inp=>{
                inp.addEventListener('change', e=>{
                    let file = e.target.files[0];
                    let id = inp.dataset.id;
                    if(file){
                        let reader = new FileReader();
                        reader.onload = ev=>{ let newPhotos = getPhotos(); newPhotos[id]=ev.target.result; savePhotos(newPhotos); renderAdminPanel(container); };
                        reader.readAsDataURL(file);
                    }
                });
            });
        }
        
        // 热度排序
        let hotList = guests.map(g=>({ id:g.id, total: (r1Counts[g.id]||0)+(r2Counts[g.id]||0) })).sort((a,b)=>b.total-a.total);
        let hotHtml = '<div style="display:flex; flex-wrap:wrap; gap:8px;">';
        hotList.forEach(h=>{ hotHtml += `<span class="badge">#${h.id} ❤️ ${h.total}次</span>`; });
        hotHtml += '</div>';
        document.getElementById('hotRank').innerHTML = hotHtml;
        
        document.getElementById('saveProfilesBtn')?.addEventListener('click',()=>{
            let newProfiles = {...getProfiles()};
            guests.forEach(g=>{
                let ageInp = document.querySelector(`.profileAge[data-id="${g.id}"]`);
                let jobInp = document.querySelector(`.profileJob[data-id="${g.id}"]`);
                let introInp = document.querySelector(`.profileIntro[data-id="${g.id}"]`);
                if(ageInp) newProfiles[g.id] = { ...newProfiles[g.id], age: ageInp.value, job: jobInp.value, selfIntro: introInp.value, intro: introInp.value };
            });
            saveProfiles(newProfiles);
            alert('资料卡已保存！');
        });
        
        document.querySelectorAll('.view-profile').forEach(link=>{
            link.addEventListener('click',(e)=>{
                e.preventDefault();
                let gid = link.dataset.id;
                let p = profiles[gid] || {};
                alert(`#${gid}\n年龄：${p.age||'?'}\n职业：${p.job||'待填写'}\n自我介绍：${p.selfIntro||p.intro||'期待与你相遇'}`);
            });
        });
        
        document.getElementById('backToUser')?.addEventListener('click',()=>{ currentView='user'; render(); });
        document.getElementById('clearAllBtn')?.addEventListener('click',()=>{
            if(confirm('⚠️ 清空所有数据，不可恢复！')){ clearAllData(); renderAdminPanel(container); }
        });
        
        function refreshMsgs(){
            let msgs = getMessages();
            let area = document.getElementById('adminMsgs');
            if(area) area.innerHTML = msgs.slice().reverse().map(m=>`<div class="msg-item"><div class="msg-meta">${escapeHtml(m.nickname)}(${m.code}) ${new Date(m.timestamp).toLocaleString()}</div><div>${escapeHtml(m.text)}</div></div>`).join('');
            if(msgs.length===0) area.innerHTML = '<div class="msg-item">暂无留言</div>';
        }
        refreshMsgs();
        if(window.adminInt) clearInterval(window.adminInt);
        window.adminInt = setInterval(()=>{ if(currentView==='admin') refreshMsgs(); }, 3000);
    }
    
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    initData();
    if(window.location.hash === '#admin') currentView = 'adminLogin';
    else currentView = 'user';
    render();
    window.addEventListener('hashchange',()=>{ currentView = window.location.hash === '#admin' ? 'adminLogin' : 'user'; render(); });
})();
</script>
</body>
</html>
